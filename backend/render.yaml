services:
  - type: web
    name: mindrift-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: CONVEX_URL
        sync: false
      - key: CONVEX_SITE_URL
        sync: false
      - key: JWT_ISSUER
        sync: false
      - key: JWT_AUDIENCE
        sync: false
      - key: JWT_KEY_ID
        sync: false
      - key: JWT_PUBLIC_KEY_JWK
        sync: false
      - key: JWT_PRIVATE_KEY_PEM
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
    autoDeploy: true
